<!DOCTYPE html>
<html>
<head>
    <title>Ticket Booking App</title>
</head>
<body>
    <h1>Ticket Booking Application</h1>

    <form action="/book" method="post">
        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Select Ticket:</label><br>
        <select name="ticket">
            <option>Movie Ticket</option>
            <option>Bus Ticket</option>
            <option>Train Ticket</option>
            <option>Event Ticket</option>
        </select><br><br>

        <label>Quantity:</label><br>
        <input type="number" name="quantity" required><br><br>

        <button type="submit">Book Ticket</button>
    </form>
</body>
</html>
